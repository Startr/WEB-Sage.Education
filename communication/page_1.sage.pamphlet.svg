  </text>
  <text x="700" y="480" font-size="16" font-family="Arial" fill="#333">
    info.abcdoc@gmail.com
  </text>
  <text x="700" y="510" font-size="16" font-family="Arial" fill="#333">
    378–980–0664
  </text>

  <!-- Bottom image -->
  <circle cx="950" cy="550" r="120" fill="#ddd"/>
  <text x="900" y="555" font-size="14" fill="#777">Image</text>

  <!-- Bottom decoration -->
  <circle cx="860" cy="620" r="30" fill="#4a56a6"/>
  <circle cx="1050" cy="520" r="40" fill="#6a2ca0"/>

</svg>
